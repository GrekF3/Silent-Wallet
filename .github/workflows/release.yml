name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  desktop:
    name: Desktop ${{ matrix.platform }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: --target universal-apple-darwin
          - platform: windows-latest
            args: ""
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
      - if: matrix.platform == 'macos-latest'
        run: rustup target add aarch64-apple-darwin x86_64-apple-darwin
      - run: npm ci
      - run: npm run build:app
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Silent Wallet ${{ github.ref_name }}"
          releaseDraft: false
          prerelease: false
          args: ${{ matrix.args }}

  android:
    name: Android beta artifact
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
      - uses: android-actions/setup-android@v3
      - run: npm ci
      - run: npm run build:app
      - run: npx cap add android
      - run: npx cap sync android
      - run: cd android && ./gradlew assembleDebug
      - uses: actions/upload-artifact@v4
        with:
          name: silent-wallet-android-debug
          path: android/app/build/outputs/apk/debug/*.apk

  android-release-asset:
    name: Platform release assets
    needs: [desktop, android]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: silent-wallet-android-debug
          path: android-artifact
      - name: Add platform-named release assets
        run: |
          set -euo pipefail
          tag="${{ github.ref_name }}"
          mkdir -p release-assets platform-assets
          gh release download "$tag" --dir release-assets

          cp android-artifact/*.apk platform-assets/Silent-Wallet-android-debug.apk

          shopt -s nullglob
          win_setup=(release-assets/Silent.Wallet_*_x64-setup.exe)
          win_msi=(release-assets/Silent.Wallet_*_x64_en-US.msi)
          mac_dmg=(release-assets/Silent.Wallet_*_universal.dmg)
          mac_app=(release-assets/Silent.Wallet_universal.app.tar.gz)

          if [ ${#win_setup[@]} -gt 0 ]; then
            cp "${win_setup[0]}" platform-assets/Silent-Wallet-win-x64-setup.exe
          fi
          if [ ${#win_msi[@]} -gt 0 ]; then
            cp "${win_msi[0]}" platform-assets/Silent-Wallet-win-x64.msi
          fi
          if [ ${#mac_dmg[@]} -gt 0 ]; then
            cp "${mac_dmg[0]}" platform-assets/Silent-Wallet-mac-universal.dmg
          fi
          if [ ${#mac_app[@]} -gt 0 ]; then
            cp "${mac_app[0]}" platform-assets/Silent-Wallet-mac-universal.app.tar.gz
          fi

          gh release upload "$tag" platform-assets/* --clobber
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
